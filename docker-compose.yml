version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: autoparts-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123456}
      MYSQL_DATABASE: autoparts
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - autoparts-network

  redis:
    image: redis:7-alpine
    container_name: autoparts-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - autoparts-network

  backend:
    build: .
    container_name: autoparts-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      OSS_ENABLED: ${OSS_ENABLED:-false}
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
    networks:
      - autoparts-network

  nginx:
    image: nginx:alpine
    container_name: autoparts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./web-mall/dist:/usr/share/nginx/html/mall
      - ./web-admin/dist:/usr/share/nginx/html/admin
      - ./uploads:/usr/share/nginx/html/uploads
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - autoparts-network

volumes:
  mysql-data:
  redis-data:

networks:
  autoparts-network:
    driver: bridge
