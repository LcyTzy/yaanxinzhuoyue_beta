spring:
  datasource:
    password: ${DB_PASSWORD:dev_password}

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-change-in-production}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.zhantu: debug

alipay:
  app-id: ${ALIPAY_APP_ID:}
  merchant-private-key: ${ALIPAY_MERCHANT_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_ALIPAY_PUBLIC_KEY:}
  notify-url: ${ALIPAY_NOTIFY_URL:}
  return-url: ${ALIPAY_RETURN_URL:}
  sign-type: RSA2
  gateway-url: https://openapi.alipay.com/gateway.do

kuaidi100:
  key: ${KUAIDI100_KEY:}
  customer: ${KUAIDI100_CUSTOMER:}
  query-url: https://poll.kuaidi100.com/poll/query.do

wechatpay:
  mch-id: ${WECHATPAY_MCH_ID:}
  merchant-serial-number: ${WECHATPAY_MERCHANT_SERIAL_NUMBER:}
  private-key: ${WECHATPAY_PRIVATE_KEY:}
  api-v3-key: ${WECHATPAY_API_V3_KEY:}
  app-id: ${WECHATPAY_APP_ID:}
  notify-url: ${WECHATPAY_NOTIFY_URL:}